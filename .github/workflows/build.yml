---
name: Build container image
run-name: Build photobooth-app by @${{ github.actor }}
on:
  repository_dispatch:
    types:
      - build
  pull_request:
    branches:
      - main
  schedule:
    - cron: "06 00 * * 6" # 0600 UTC Saturday
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
  workflow_dispatch:

  permissions:
    contents: read
    packages: write
    id-token: write

env:
  IMAGE_DESC: "Minimal Debian image with photobooth-app"
  IMAGE_KEYWORDS: "debian,photobooth-app,photobooth"
  IMAGE_LOGO_URL: "https://raw.githubusercontent.com/JohnMertz/photobooth-app-docker/refs/heads/main/photobooth-app-docker.png" # Put your own image here for a fancy profile on https://artifacthub.io/!
  IMAGE_NAME: "ghcr.io/${{ github.repository_owner }}/photobooth-app"

jobs:
  build:
    name: Build photobooth-app image
    continue-on-error: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
